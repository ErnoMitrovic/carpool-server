<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f9; }
        h2 { text-align: center; }
        #chat-box {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            background: white;
            display: flex;
            flex-direction: column;
        }
        .message {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 10px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .message.sender { background: #dcf8c6; align-self: flex-end; }
        .message.receiver { background: #ffffff; align-self: flex-start; border: 1px solid #ccc; }
        .timestamp { font-size: 12px; color: gray; display: block; text-align: right; }
        .status { font-size: 12px; color: blue; cursor: pointer; display: block; text-align: right; }
        .status:hover { text-decoration: underline; }
        input, button, select { margin-top: 10px; padding: 10px; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
        #chat-container { display: none; }
    </style>
</head>
<body>

<h2>WebSocket Chat</h2>

<div id="user-setup">
    <label>Enter your username:</label>
    <input type="text" id="username" placeholder="Enter your username">

    <label>Select Chat Type:</label>
    <select id="chatType" onchange="toggleChatFields()">
        <option value="group">Group Chat (Ride)</option>
        <option value="private">Private Chat (DM)</option>
    </select>

    <div id="group-chat-fields">
        <input type="text" id="rideId" placeholder="Enter Ride ID">
    </div>

    <div id="private-chat-fields" style="display: none;">
        <input type="text" id="receiverId" placeholder="Enter Receiver ID">
    </div>

    <button onclick="connectWebSocket()">Connect</button>
</div>

<div id="chat-container">
    <h3>Chat</h3>
    <div id="chat-box"></div>
    <input type="text" id="messageInput" placeholder="Type your message">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    let socket;
    let username = "";

    function toggleChatFields() {
        const chatType = document.getElementById("chatType").value;
        document.getElementById("group-chat-fields").style.display = chatType === "group" ? "block" : "none";
        document.getElementById("private-chat-fields").style.display = chatType === "private" ? "block" : "none";
    }

    function connectWebSocket() {
        username = document.getElementById("username").value.trim();
        if (!username) {
            alert("Please enter your username.");
            return;
        }

        const chatType = document.getElementById("chatType").value;
        let wsUrl = "ws://localhost:8080/chat";

        if (chatType === "group") {
            const rideId = document.getElementById("rideId").value.trim();
            if (!rideId) {
                alert("Please enter a Ride ID.");
                return;
            }
            wsUrl += `?rideId=${rideId}`;
        } else {
            const receiverId = document.getElementById("receiverId").value.trim();
            if (!receiverId) {
                alert("Please enter a Receiver ID.");
                return;
            }
            wsUrl += `?senderId=${username}&receiverId=${receiverId}`;
        }

        socket = new WebSocket(wsUrl);

        socket.onopen = function() {
            console.log("Connected to WebSocket:", wsUrl);
            document.getElementById("chat-box").innerHTML += `<p><b>Connected as ${username}!</b></p>`;
            document.getElementById("user-setup").style.display = "none";
            document.getElementById("chat-container").style.display = "block";
        };

        socket.onmessage = function(event) {
            try {
                const messages = JSON.parse(event.data);
                console.log("Parsed Messages:", messages);

                if (Array.isArray(messages)) {

                    let chatBox = document.getElementById("chat-box");
                    chatBox.innerHTML = ""; // Clear existing messages before rendering updated history

                    messages.forEach(message => {
                        displayMessage(message);
                    });

                    // Auto-scroll to the latest message
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    console.error("Unexpected WebSocket data format:", messages);
                }
            } catch (error) {
                console.error("Error processing WebSocket message:", event.data, error);
            }
        };

        socket.onclose = function() {
            document.getElementById("chat-box").innerHTML += "<p><b>Disconnected!</b></p>";
        };

        socket.onerror = function(error) {
            console.error("WebSocket Error:", error);
        };
    }

    function displayMessage(message) {
        let chatBox = document.getElementById("chat-box");
        const messageElement = document.createElement("div");
        messageElement.classList.add("message", message.senderId === username ? "sender" : "receiver");

        const timestamp = new Date(message.timestamp).toLocaleTimeString();
        messageElement.innerHTML = `
            <b>${message.senderId}</b>: ${message.content}
            <span class="timestamp">${timestamp}</span>
            <span class="status" onclick="markAsRead('${message.id}')">${message.status}</span>
        `;
        chatBox.appendChild(messageElement);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
        const messageInput = document.getElementById("messageInput").value.trim();
        if (!messageInput) return;

        if (socket && socket.readyState === WebSocket.OPEN) {
            const message = JSON.stringify({
                type: "MESSAGE",
                senderId: username,
                content: messageInput,
            });

            socket.send(message);
            document.getElementById("messageInput").value = "";
        } else {
            alert("WebSocket is not connected.");
        }
    }

    function markAsRead(messageId) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            const statusUpdate = JSON.stringify({
                type: "STATUS_UPDATE",
                messageId: messageId,
                status: "READ"
            });

            socket.send(statusUpdate);
            document.querySelectorAll(".status").forEach(statusElem => {
                if (statusElem.onclick.toString().includes(messageId)) {
                    statusElem.textContent = "READ";
                    statusElem.style.color = "green";
                }
            });
        } else {
            alert("WebSocket is not connected.");
        }
    }
</script>

</body>
</html>
