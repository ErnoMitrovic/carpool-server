# This is a test application-test.properties file
# Use h2 in-memory database
spring.application.name=carpool-test

spring.datasource.url=jdbc:h2:mem:${random.value}
spring.datasource.username=${random.value}
spring.datasource.password=${random.value}
spring.jpa.hibernate.ddl-auto=update

api.version=v1

spring.sql.init.schema-locations=classpath:/sql/schema.sql
spring.sql.init.data-locations=classpath:/sql/data.sql
spring.sql.init.mode=always