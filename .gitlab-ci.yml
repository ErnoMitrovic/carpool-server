image: maven:3.9.5-eclipse-temurin-17  # Use Maven with JDK 17

stages:
  - build
  - test

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository" # Cache dependencies
  CACHE_DIR: ".m2/repository" # Define cache directory
  DOCKER_HOST: "unix:///var/run/docker.sock"  # Use host's Docker daemon
  TESTCONTAINERS_RYUK_DISABLED: "true"  # Avoid permission issues with Ryuk
  TESTCONTAINERS_CHECKS_DISABLE: "true"  # Speed up Testcontainers startup
  TESTCONTAINERS_HOST_OVERRIDE: "tcp://localhost:2375"  # Ensure proper Testcontainers networking

cache:
  key: ${CI_COMMIT_REF_SLUG} # Cache per branch
  paths:
    - ${CACHE_DIR}

before_script:
  - echo "Using Java version:"
  - java -version
  - echo "Using Maven version:"
  - mvn -version

build:
  stage: build
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/  # Save compiled code

test:
  stage: test
  script:
    - mvn test
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml # Store JUnit test results
    paths:
      - target/site/jacoco/ # Save JaCoCo coverage reports (optional)
