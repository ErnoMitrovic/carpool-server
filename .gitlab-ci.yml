image: maven:3.9.5-eclipse-temurin-17  # Use a Maven image with JDK 17

services:
  - docker:dind  # Enable Docker-in-Docker for Testcontainers

variables:
  DOCKER_HOST: "tcp://docker:2375"  # Allow Testcontainers to communicate with Docker
  DOCKER_TLS_CERTDIR: ""  # Disable TLS (needed for DinD)
  TESTCONTAINERS_RYUK_DISABLED: "true"  # Avoid Ryuk permission issues
  TESTCONTAINERS_CHECKS_DISABLE: "true"  # Speed up Testcontainers startup
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"  # Cache Maven dependencies
  CACHE_DIR: ".m2/repository"  # Define cache directory

cache:
  key: ${CI_COMMIT_REF_SLUG}  # Cache per branch
  paths:
    - ${CACHE_DIR}

before_script:
  - echo "Using Java version:"
  - java -version
  - echo "Using Maven version:"
  - mvn -version
  - docker info  # Check if Docker is running

stages:
  - build
  - test

build:
  tags:
    - testing
  stage: build
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/  # Save compiled code

test:
  stage: test
  tags:
    - testing
  script:
    - mvn test -Dorg.testcontainers.DEBUG=true  # Enable Testcontainers debug logs
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml  # Store JUnit test results
    paths:
      - target/site/jacoco/  # Save JaCoCo coverage reports (optional)
