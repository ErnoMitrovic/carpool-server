image: docker:20.10.16

services:
  - docker:dind

variables:
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  TESTCONTAINERS_RYUK_DISABLED: "true"
  TESTCONTAINERS_CHECKS_DISABLE: "true"

stages:
  - build
  - test

before_script:
  - apk add --no-cache openjdk17 maven  # Install JDK and Maven
  - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
  - chmod +x mvnw
  - docker info  # Check if Docker is running

build:
  tags:
    - testing
  stage: build
  script:
    - mvn clean compile
  artifacts:
    paths:
      - target/

test:
  stage: test
  tags:
    - testing
  script:
    - mvn test
  artifacts:
    reports:
      junit: target/surefire-reports/TEST-*.xml
    paths:
      - target/site/jacoco/
